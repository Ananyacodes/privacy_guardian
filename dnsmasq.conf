# /etc/dnsmasq.conf
# Privacy Guardian v2.1 — DHCP Configuration
# dnsmasq is used ONLY for DHCP in this setup.
# DNS is handled entirely by AdGuard Home on port 53.
# Do NOT enable dnsmasq DNS — it would conflict with AdGuard.

# ─── Disable dnsmasq DNS ─────────────────────────────────────────────────────
# Port 0 disables the DNS server function completely
# AdGuard Home owns port 53 exclusively
port=0

# ─── Interface Binding ───────────────────────────────────────────────────────
# Only serve DHCP on the LAN (Wi-Fi) interface
# Never serve on WAN (eth0) — that faces the internet
interface=wlan0
bind-interfaces                  # Strictly bind to wlan0 only
except-interface=eth0            # Explicitly exclude WAN interface
except-interface=lo              # Exclude loopback

# ─── DHCP Pool ───────────────────────────────────────────────────────────────
# Assigns IPs to connecting devices
# Range: 192.168.4.10 → 192.168.4.200 (190 addresses)
# Lease time: 12h (reduces DHCP chatter, still refreshes daily)
dhcp-range=192.168.4.10,192.168.4.200,255.255.255.0,12h

# ─── DHCP Options ────────────────────────────────────────────────────────────
# Tell clients the Pi is their gateway AND DNS server
# option:router = default gateway (the Pi)
# option:dns-server = DNS server (the Pi running AdGuard Home)
# Clients must use AdGuard for DNS — nftables NAT enforces this regardless
dhcp-option=option:router,192.168.4.1
dhcp-option=option:dns-server,192.168.4.1

# Subnet mask
dhcp-option=option:netmask,255.255.255.0

# ─── Static Leases (optional) ────────────────────────────────────────────────
# Assign fixed IPs to known devices by MAC address
# Format: dhcp-host=MAC,IP,hostname,leasetime
# Uncomment and add your devices:
#
# dhcp-host=aa:bb:cc:dd:ee:ff,192.168.4.2,mgmt-device,infinite
# dhcp-host=11:22:33:44:55:66,192.168.4.50,laptop,12h
# dhcp-host=ff:ee:dd:cc:bb:aa,192.168.4.100,smart-tv,12h

# ─── DNS for local hostnames ─────────────────────────────────────────────────
# Since DNS is disabled (port=0), these are for DHCP hostname injection only
# AdGuard Home handles actual DNS resolution
domain=privacy.local
local=/privacy.local/

# ─── Logging ─────────────────────────────────────────────────────────────────
log-dhcp                         # Log all DHCP transactions to syslog
# log-queries                    # Do NOT enable — DNS is disabled, this does nothing
log-facility=/var/log/dnsmasq.log

# ─── Misc Hardening ──────────────────────────────────────────────────────────
bogus-priv                       # Never forward reverse lookups for private IPs
no-resolv                        # Don't read /etc/resolv.conf (DNS is disabled anyway)
no-hosts                         # Don't read /etc/hosts for DNS (DNS is disabled)
dhcp-authoritative               # Pi is the authoritative DHCP server on this network
