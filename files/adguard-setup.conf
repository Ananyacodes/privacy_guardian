# AdGuard Home Configuration Guide — Privacy Guardian v2.1
# ──────────────────────────────────────────────────────────────────────────────
# AdGuard Home does not use a flat config file for all settings.
# Its primary config is AdGuardHome.yaml (auto-generated after first run).
# This file documents the recommended settings to apply via the Web UI
# and the AdGuardHome.yaml overrides for headless/automated deployment.
# ──────────────────────────────────────────────────────────────────────────────

# ─── STEP 1: Initial Installation ────────────────────────────────────────────
# Run the installer (as root):
#   curl -s -S -L https://raw.githubusercontent.com/AdguardTeam/AdGuardHome/master/scripts/install.sh | sh -s -- -s
#   sudo systemctl enable --now AdGuardHome
#
# First-run wizard: http://192.168.4.1:3000
#   - Admin interface: 0.0.0.0:3000 (listen on all interfaces — nftables restricts access)
#   - DNS server: 0.0.0.0:53
#   - Set admin username and a STRONG password

# ─── STEP 2: Upstream DNS (Settings → DNS Settings) ──────────────────────────
# Use encrypted upstream resolvers so your ISP cannot see your DNS queries.
# Recommended options (choose one or use parallel mode):
#
#   Privacy-focused (recommended):
#     tls://dns.quad9.net                  (Quad9 — no logging, malware blocking)
#     https://dns.quad9.net/dns-query      (Quad9 DoH)
#
#   Also good:
#     tls://dns.mullvad.net                (Mullvad — strict no-log)
#     https://dns.mullvad.net/dns-query
#
#   Avoid: Google (8.8.8.8), Cloudflare (1.1.1.1) — these are blocked at the
#   nftables level for client bypass prevention, but fine for upstream use
#   if you trust them for the Pi's own DNS.
#
# Bootstrap DNS (resolves the DoH/DoT hostnames above):
#   9.9.9.9
#   149.112.112.112

# ─── STEP 3: Blocklists (Filters → DNS Blocklists → Add Blocklist) ───────────
# These lists provide comprehensive tracker/ad/malware blocking.
# Add all of them for maximum coverage:

BLOCKLISTS:
  - name: "AdGuard DNS filter"
    url: "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"

  - name: "AdAway Default Blocklist"
    url: "https://adaway.org/hosts.txt"

  - name: "MalwareDomainList"
    url: "https://www.malwaredomainlist.com/hostslist/hosts.txt"

  - name: "Steven Black Unified Hosts (ads + malware)"
    url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"

  - name: "OISD Full"
    url: "https://big.oisd.nl/domainswild"

  - name: "1Hosts (Lite)"
    url: "https://o0.pages.dev/Lite/adblock.txt"

  - name: "HaGeZi Multi Normal"
    url: "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/multi.txt"

  # Telemetry-specific (blocks OS-level telemetry from Windows, Android, Apple)
  - name: "HaGeZi Tracking Heavy"
    url: "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.plus.txt"

# ─── STEP 4: Enable Encrypted DNS Blocking ───────────────────────────────────
# Settings → DNS Settings → "Block DoH and DoT" — ENABLE
# This tells AdGuard Home to block known DoH/DoT hostnames in addition to
# the IP-level blocking in nftables. Belt-and-suspenders approach.

# ─── STEP 5: DNS Security Features ──────────────────────────────────────────
# Settings → DNS Settings → enable:
#   ☑ Use DNSSEC                    — validates DNS responses aren't tampered with
#   ☑ Disable resolving IPv6 addresses  — enable ONLY if using disable-ipv6.sh
#   ☑ Blocking mode: Default        — returns NXDOMAIN for blocked domains
#
# Settings → General Settings → enable:
#   ☑ Use AdGuard browsing security  — blocks known phishing/malware domains
#   ☑ Use AdGuard parental control   — optional, disable if not needed

# ─── STEP 6: DHCP (Optional — Alternative to dnsmasq) ───────────────────────
# AdGuard Home can replace dnsmasq for DHCP entirely.
# Settings → DHCP Settings:
#   Interface: wlan0
#   IP range start: 192.168.4.10
#   IP range end:   192.168.4.200
#   Subnet mask:    255.255.255.0
#   Gateway:        192.168.4.1
#   Lease time:     12h
#
# If you enable AdGuard DHCP:
#   - Stop and disable dnsmasq: sudo systemctl disable --now dnsmasq
#   - Remove /etc/dnsmasq.conf or leave it with port=0

# ─── STEP 7: Query Log & Statistics ──────────────────────────────────────────
# Settings → General Settings:
#   Query log: ENABLE (stored locally on Pi — not sent anywhere)
#   Statistics retention: 7 days (longer = more SD card wear)
#   Anonymize client IPs: ENABLE for extra local privacy

# ─── AdGuardHome.yaml Key Overrides ──────────────────────────────────────────
# Location: /opt/AdGuardHome/AdGuardHome.yaml
# Edit after initial setup for automated/headless configuration.
# Run: sudo systemctl restart AdGuardHome after changes.

dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  upstream_dns:
    - tls://dns.quad9.net
    - tls://dns.mullvad.net
  bootstrap_dns:
    - 9.9.9.9
    - 149.112.112.112
  use_http3_upstreams: false    # Disable DoQ upstream — avoid UDP 443 issues
  dnssec_enabled: true
  blocking_mode: nxdomain       # Return NXDOMAIN for blocked domains

http:
  address: 0.0.0.0:3000         # nftables restricts access to MGMT_IP

log:
  file: ""                      # Empty = syslog (avoids extra SD card writes)
  max_backups: 2
  max_size: 10                  # MB
  compress: true
