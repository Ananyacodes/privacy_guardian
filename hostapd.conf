# /etc/hostapd/hostapd.conf
# Privacy Guardian v2.1 - Wi-Fi Access Point Configuration
# Controls the wlan0 interface as a software access point via hostapd

# Interface Configuration
interface=wlan0
driver=nl80211

# Wi-Fi Identity
# Change BOTH ssid and wpa_passphrase before deploying
ssid=PrivacyGuardian
wpa_passphrase=CHANGE_THIS_PASSWORD_NOW

# Radio Settings
# Use 2.4GHz (hw_mode=g) for broader device compatibility
# Switch to hw_mode=a + channel=36 for 5GHz if your Pi's Wi-Fi supports it
hw_mode=g
channel=6
ieee80211n=1
ieee80211d=1
country_code=US
wmm_enabled=1

# Security
# WPA2 with pre-shared key encryption
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_pairwise=CCMP

# Management Frame Protection
# Protects management frames from spoofing attacks (deauth floods etc.)
ieee80211w=1

# Client Isolation
# Prevents connected devices from communicating directly with each other
# They must go through the Pi - useful for IoT isolation
ap_isolate=1

# SSID Visibility
# Set to 0 to broadcast SSID (default, easier to connect)
# Set to 1 for hidden SSID (minor obscurity, not real security)
ignore_broadcast_ssid=0

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=4

# Performance Tuning for Pi
beacon_int=100
dtim_period=2
max_num_sta=20
rts_threshold=2347
fragm_threshold=2346

# Optional: Guest Network (second SSID)
# Uncomment and configure to add a separate isolated guest Wi-Fi
# Requires a second virtual interface (wlan0_0) and additional nftables rules
#
# bss=wlan0_0
# ssid=PrivacyGuardian-Guest
# wpa_passphrase=GUEST_PASSWORD_HERE
# wpa=2
# wpa_key_mgmt=WPA-PSK
# rsn_pairwise=CCMP
# ap_isolate=1
