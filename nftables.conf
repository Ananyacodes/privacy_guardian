#!/usr/sbin/nft -f
# Privacy Guardian v2.1 - Fixed Edition
# Fixes: IPv6 leaks, SSH brute force, DoH IP staleness, logging, ICMP flood, AdGuard UI exposure

flush ruleset

# ─── Interface & Network Definitions ─────────────────────────────────────────
define WAN_IF     = eth0
define LAN_IF     = wlan0
define LAN_NET    = 192.168.4.0/24
define LAN_NET6   = fd00::/64          # ULA prefix for LAN IPv6 (adjust to match your setup)
define PI_IP      = 192.168.4.1
define PI_IP6     = fd00::1            # Pi's IPv6 LAN address
define MGMT_IP    = 192.168.4.2       # Admin device IP — only this IP can access AdGuard UI + SSH

# ─── Zone Layout (edit to match your DHCP/static addressing plan) ───────────
# trusted: personal devices (laptops/phones)
# iot: smart TVs, streaming sticks, cameras, appliances
# guest: temporary/untrusted devices
define ZONE_TRUSTED = { 192.168.4.10-192.168.4.49 }
define ZONE_IOT     = { 192.168.4.50-192.168.4.199 }
define ZONE_GUEST   = { 192.168.4.200-192.168.4.254 }

# ─── Known Public DoH/DoT Resolver IPs ───────────────────────────────────────
# NOTE: Update this list periodically — resolvers add new IPs on CDN ranges.
# See update-doh-ips.sh for semi-automated refresh.
define DOH_IPS = {
    1.0.0.1,          # Cloudflare
    1.1.1.1,          # Cloudflare
    8.8.4.4,          # Google
    8.8.8.8,          # Google
    9.9.9.9,          # Quad9
    149.112.112.112,  # Quad9
    208.67.222.222,   # OpenDNS
    208.67.220.220,   # OpenDNS
    76.76.2.0,        # ControlD
    76.76.10.0,       # ControlD
    94.140.14.14,     # AdGuard DNS
    94.140.15.15,     # AdGuard DNS
    185.228.168.9,    # CleanBrowsing
    185.228.169.9,    # CleanBrowsing
    76.223.122.150,   # NextDNS
    45.90.28.0        # NextDNS
}

define DOH_IPS6 = {
    2606:4700:4700::1111,   # Cloudflare
    2606:4700:4700::1001,   # Cloudflare
    2001:4860:4860::8888,   # Google
    2001:4860:4860::8844,   # Google
    2620:fe::fe,            # Quad9
    2620:fe::9              # Quad9
}

# ─────────────────────────────────────────────────────────────────────────────
# IPv4 + IPv6 FILTER TABLE
# ─────────────────────────────────────────────────────────────────────────────
table inet filter {

    # Zone membership sets (IPv4 LAN). Keep in sync with DHCP/static leases.
    set zone_trusted_clients {
        type ipv4_addr
        flags interval
        elements = $ZONE_TRUSTED
    }

    set zone_iot_clients {
        type ipv4_addr
        flags interval
        elements = $ZONE_IOT
    }

    set zone_guest_clients {
        type ipv4_addr
        flags interval
        elements = $ZONE_GUEST
    }

    # Per-device overrides for gradual tuning.
    # Keep these sets empty by default and add entries only when required.
    # Format:
    #   device_tcp_allow: { 192.168.4.55 . 8883 }
    #   device_udp_allow: { 192.168.4.55 . 5683 }
    set device_tcp_allow {
        type ipv4_addr . inet_service
    }

    set device_udp_allow {
        type ipv4_addr . inet_service
    }

    set device_block_all {
        type ipv4_addr
        flags interval
    }

    # Dynamic tracker IP set — populated by update-trackers.sh
    set tracker_ips {
        type ipv4_addr
        flags interval
        auto-merge          # Collapses overlapping ranges automatically
    }

    set tracker_ips6 {
        type ipv6_addr
        flags interval
        auto-merge
    }

    # ── INPUT CHAIN ──────────────────────────────────────────────────────────
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback always allowed
        iif lo accept

        # Drop invalid conntrack states immediately
        ct state invalid drop

        # Allow established/related return traffic
        ct state established,related accept

        # Route by incoming interface
        iifname $WAN_IF jump wan_input
        iifname $LAN_IF jump lan_input

        # Log and drop everything else
        log prefix "PG-INPUT-DROP: " flags all drop
    }

    # ── WAN INPUT ────────────────────────────────────────────────────────────
    chain wan_input {
        # Rate-limited ICMP/ICMPv6 from WAN (prevent flood/recon)
        ip  protocol icmp   icmp  type echo-request limit rate 5/second burst 10 packets accept
        ip6 nexthdr  icmpv6 icmpv6 type echo-request limit rate 5/second burst 10 packets accept

        # Drop fragmented packets — rarely legitimate, common evasion technique
        ip frag-off & 0x1fff != 0 log prefix "PG-FRAG-DROP: " drop

        # Drop everything else from WAN
        log prefix "PG-WAN-DROP: " drop
    }

    # ── LAN INPUT ────────────────────────────────────────────────────────────
    chain lan_input {
        ct state invalid drop

        # DNS — AdGuard Home (all LAN devices)
        udp dport 53 accept comment "AdGuard DNS UDP"
        tcp dport 53 accept comment "AdGuard DNS TCP"

        # SSH — restricted to MGMT_IP only + rate limited (3 attempts/min)
        ip saddr $MGMT_IP tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept
        ip saddr $MGMT_IP tcp dport 22 ct state new log prefix "PG-SSH-RATELIMIT: " drop
        tcp dport 22 log prefix "PG-SSH-UNAUTH: " drop  comment "Block SSH from non-mgmt IPs"

        # AdGuard Home UI — restricted to MGMT_IP only
        ip saddr $MGMT_IP tcp dport 3000 accept comment "AdGuard UI (mgmt only)"
        tcp dport 3000 log prefix "PG-UI-UNAUTH: " drop comment "Block UI from non-mgmt IPs"

        # AdGuard Home UI on port 80 (if configured) — mgmt only
        ip saddr $MGMT_IP tcp dport 80 accept comment "AdGuard HTTP UI (mgmt only)"
        tcp dport 80 drop

        # ICMP/ICMPv6 from LAN — rate limited
        ip  protocol icmp   limit rate 10/second accept
        ip6 nexthdr  icmpv6 icmpv6 type {
            echo-request, echo-reply,
            nd-neighbor-solicit, nd-neighbor-advert,
            nd-router-advert, nd-router-solicit,
            mld-listener-query
        } accept

        # DHCP (dnsmasq) — UDP only
        udp dport 67 accept comment "DHCP"

        # Default deny for any other direct access to router services from LAN
        log prefix "PG-LAN-DROP: " drop
    }

    # ── FORWARD CHAIN ────────────────────────────────────────────────────────
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state invalid drop
        ct state established,related accept

        # LAN → WAN: run through privacy enforcement
        iifname $LAN_IF oifname $WAN_IF jump privacy_chain

        # Drop and log everything else
        log prefix "PG-FORWARD-DROP: " drop
    }

    # ── PRIVACY ENFORCEMENT CHAIN ─────────────────────────────────────────────
    chain privacy_chain {

        # Block connections to known public DoH resolvers (IPv4 + IPv6)
        ip  daddr $DOH_IPS  tcp dport 443 log prefix "PG-DOH-BLOCK: "  drop comment "Block public DoH (IPv4)"
        ip6 daddr $DOH_IPS6 tcp dport 443 log prefix "PG-DOH6-BLOCK: " drop comment "Block public DoH (IPv6)"

        # Block DNS-over-TLS (port 853) — both TCP and UDP
        tcp dport 853 log prefix "PG-DOT-BLOCK: " drop comment "Block DoT TCP"
        udp dport 853 log prefix "PG-DOT-BLOCK: " drop comment "Block DoT UDP"

        # Block DNS-over-QUIC (port 8853) — less common but emerging standard
        udp dport 8853 log prefix "PG-DOQ-BLOCK: " drop comment "Block DoQ"

        # OPTIONAL: Block HTTP/3 (QUIC on UDP 443) — uncomment only after testing.
        # WARNING: Breaks YouTube, Google, Facebook performance (they fall back to TCP but slower).
        # udp dport 443 log prefix "PG-QUIC-BLOCK: " drop comment "Block DoQ/HTTP3"

        # Block known tracker IPs (populated dynamically by update-trackers.sh)
        ip  daddr @tracker_ips  log prefix "PG-TRACKER-BLOCK: "  drop
        ip6 daddr @tracker_ips6 log prefix "PG-TRACKER6-BLOCK: " drop

        # Rate limit new outbound connections per source IP (anti-beaconing/malware)
        ct state new limit rate over 100/minute burst 200 packets log prefix "PG-RATE-LIMIT: " drop

        # ── Block protocols that leak device identity to external servers ─────────────
        # These are legitimate LAN-local protocols that should never reach the internet.
        # Smart TVs, streaming sticks, and IoT devices commonly exploit these to report
        # device model, LAN topology, neighbouring MACs, and real device IPs upstream.

        # STUN/TURN — WebRTC peer-to-peer negotiation. Reveals the real LAN IP of each
        # device to the remote server even behind NAT. Used by smart TV browsers,
        # video-call apps, and ad-tech SDKs. Block entirely; apps fall back to relay.
        udp dport { 3478, 3479, 5349, 5350 } log prefix "PG-STUN-BLOCK: " drop comment "Block STUN/TURN WebRTC IP leak"
        tcp dport { 3478, 3479, 5349, 5350 } log prefix "PG-STUN-BLOCK: " drop comment "Block STUN/TURN WebRTC IP leak"

        # SSDP/UPnP — devices broadcast their model name, firmware version, and open
        # ports to anyone who asks. UPnP can also be abused to open inbound holes.
        udp dport 1900 log prefix "PG-SSDP-BLOCK: " drop comment "Block SSDP/UPnP device discovery"

        # mDNS (Bonjour/Avahi) — local zero-config discovery; leaks hostname, OS type,
        # and running services. Multicast-only by design; should never leave the LAN.
        udp dport 5353 log prefix "PG-MDNS-BLOCK: " drop comment "Block mDNS LAN leak"

        # NetBIOS / SMB — exposes Windows hostnames, share names, and workgroup.
        udp dport { 137, 138 }  log prefix "PG-NETBIOS-BLOCK: " drop comment "Block NetBIOS datagram/name service"
        tcp dport { 139, 445 }  log prefix "PG-SMB-BLOCK: "     drop comment "Block SMB file sharing"

        # Telnet — cleartext; any IoT device still phoning home on 23 exposes credentials.
        tcp dport 23 log prefix "PG-TELNET-BLOCK: " drop comment "Block Telnet"

        # ── Per-device overrides (evaluated after global privacy baseline) ──────────
        # This allows targeted exceptions without widening an entire zone policy.
        ip saddr @device_block_all log prefix "PG-DEVICE-BLOCK: " drop comment "Explicit device block"
        ip saddr . tcp dport @device_tcp_allow accept comment "Per-device TCP allow"
        ip saddr . udp dport @device_udp_allow accept comment "Per-device UDP allow"

        # ── Zone dispatch (source-IP based) ─────────────────────────────────────────
        # Unknown devices are denied by default. This prevents rogue clients from
        # getting internet access until intentionally placed into a zone.
        ip saddr @zone_trusted_clients jump zone_trusted_egress
        ip saddr @zone_iot_clients     jump zone_iot_egress
        ip saddr @zone_guest_clients   jump zone_guest_egress

        # If IPv6 is enabled on LAN, treat all LAN IPv6 clients as IoT-strict by default.
        # Create explicit IPv6 zone sets if you need per-zone IPv6 segmentation.
        ip6 saddr $LAN_NET6 jump zone_iot_egress

        log prefix "PG-ZONE-UNKNOWN-DROP: " drop comment "Device not assigned to any zone"
    }

    chain zone_trusted_egress {
        # Personal devices: full web + secure comms + push + SSH
        tcp dport { 80, 443, 22 }       accept comment "Trusted web + SSH"
        tcp dport { 465, 587, 993, 995 } accept comment "Trusted encrypted mail"
        tcp dport { 5222, 5223 }        accept comment "Trusted push notifications"
        udp dport { 123, 443 }          accept comment "Trusted NTP + QUIC"

        log prefix "PG-TRUSTED-DROP: " drop comment "Trusted zone default deny"
    }

    chain zone_iot_egress {
        # IoT/Smart TV: strict internet profile to reduce telemetry channels.
        tcp dport { 80, 443 }           accept comment "IoT web/streaming over TLS"
        tcp dport { 5228, 5229, 5230 }  accept comment "Android/Google device updates"
        tcp dport 5223                  accept comment "Apple TV/iOS push"
        udp dport 123                   accept comment "IoT time sync"

        # Keep QUIC blocked for IoT to reduce opaque telemetry paths.
        # If specific apps break, allow only for known device IPs via targeted rule.
        # udp dport 443 accept comment "IoT QUIC"

        log prefix "PG-IOT-DROP: " drop comment "IoT zone default deny"
    }

    chain zone_guest_egress {
        # Guest devices: web-only profile
        tcp dport { 80, 443 }           accept comment "Guest web browsing"
        udp dport 123                   accept comment "Guest time sync"

        log prefix "PG-GUEST-DROP: " drop comment "Guest zone default deny"
    }

    # ── OUTPUT CHAIN ─────────────────────────────────────────────────────────
    chain output {
        type filter hook output priority 0; policy accept;
        # Pi's own traffic is trusted — no restrictions
        # Add rules here if you want to restrict the Pi's own outbound traffic
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# IPv4 NAT TABLE
# ─────────────────────────────────────────────────────────────────────────────
table ip nat {
    chain prerouting {
        type nat hook prerouting priority -100; policy accept;

        # Force ALL DNS from LAN to AdGuard Home — intercepts hardcoded DNS bypasses
        iifname $LAN_IF meta l4proto { udp, tcp } th dport 53 dnat to $PI_IP:53 \
            comment "Redirect all DNS to AdGuard"
    }

    chain postrouting {
        type nat hook postrouting priority 100; policy accept;

        # Masquerade LAN traffic on WAN — hides device identities from internet
        oifname $WAN_IF ip saddr $LAN_NET masquerade
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# IPv6 NAT TABLE
# ─────────────────────────────────────────────────────────────────────────────
table ip6 nat {
    chain prerouting {
        type nat hook prerouting priority -100; policy accept;

        # Force IPv6 DNS to AdGuard Home
        iifname $LAN_IF meta l4proto { udp, tcp } th dport 53 dnat to [$PI_IP6]:53 \
            comment "Redirect IPv6 DNS to AdGuard"
    }

    chain postrouting {
        type nat hook postrouting priority 100; policy accept;

        # Masquerade IPv6 LAN traffic — prevents device-level IPv6 tracking
        oifname $WAN_IF ip6 saddr $LAN_NET6 masquerade
    }
}
