# /etc/sysctl.d/99-privacy-guardian.conf
# Privacy Guardian v2.1 — Kernel Network Parameter Hardening
# Applied at boot via: sysctl -p /etc/sysctl.d/99-privacy-guardian.conf
# Or immediately: sudo sysctl --system

# ─────────────────────────────────────────────────────────────────────────────
# IP FORWARDING — REQUIRED for router function
# Without this, packets will not be forwarded between wlan0 and eth0
# ─────────────────────────────────────────────────────────────────────────────
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1       # Required if using IPv6 NAT routing

# ─────────────────────────────────────────────────────────────────────────────
# ANTI-SPOOFING
# ─────────────────────────────────────────────────────────────────────────────
# Reverse path filtering — drop packets with impossible source addresses
# Mode 1 = strict (recommended), Mode 2 = loose
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.eth0.rp_filter = 1
net.ipv4.conf.wlan0.rp_filter = 1

# ─────────────────────────────────────────────────────────────────────────────
# ICMP HARDENING
# ─────────────────────────────────────────────────────────────────────────────
# Ignore broadcast pings — prevents smurf amplification attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Don't respond to ICMP redirects (prevents routing table manipulation)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.eth0.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects (Pi is a router but shouldn't redirect clients)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.eth0.send_redirects = 0

# ─────────────────────────────────────────────────────────────────────────────
# SOURCE ROUTING
# ─────────────────────────────────────────────────────────────────────────────
# Disable source routing — packets must use the routing table, not client-specified routes
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# ─────────────────────────────────────────────────────────────────────────────
# SYN FLOOD PROTECTION
# ─────────────────────────────────────────────────────────────────────────────
# SYN cookies — respond to SYN flood without filling the SYN backlog
net.ipv4.tcp_syncookies = 1

# Reduce SYN retries to limit resource exhaustion from half-open connections
net.ipv4.tcp_syn_retries = 3
net.ipv4.tcp_synack_retries = 3

# ─────────────────────────────────────────────────────────────────────────────
# TIME-WAIT HARDENING
# ─────────────────────────────────────────────────────────────────────────────
# Reuse TIME-WAIT sockets for new connections (safe for a NAT router)
net.ipv4.tcp_tw_reuse = 1

# Increase the number of connections that can be tracked
# Default is often low on Pi — increase for households with many devices
net.netfilter.nf_conntrack_max = 65536

# ─────────────────────────────────────────────────────────────────────────────
# IPv6 RA & AUTOCONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
# Don't accept router advertisements on WAN — the Pi IS the router
net.ipv6.conf.eth0.accept_ra = 0
net.ipv6.conf.wlan0.accept_ra = 0

# If disabling IPv6 entirely (use disable-ipv6.sh instead for full disable):
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1

# ─────────────────────────────────────────────────────────────────────────────
# LOG MARTIANS (optional — noisy, good for debugging)
# ─────────────────────────────────────────────────────────────────────────────
# Log packets with impossible source addresses (useful during initial setup)
# Disable on production to reduce log noise
# net.ipv4.conf.all.log_martians = 1
# net.ipv4.conf.eth0.log_martians = 1
