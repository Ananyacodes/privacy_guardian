# /etc/dhcpcd.conf
# Privacy Guardian v2.1 — Network Interface Configuration
# Sets static IP on wlan0 (LAN) and dynamic IP on eth0 (WAN)

# ─── Global Settings ─────────────────────────────────────────────────────────
# Don't send hostname to DHCP server (minor privacy improvement on WAN)
nohook lookup-hostname

# Randomize client ID to reduce tracking by upstream ISP DHCP server
# Comment out if your ISP requires a fixed client ID for authentication
slaac private

# ─── WAN Interface (eth0) ────────────────────────────────────────────────────
# Connects to your existing router/ISP modem
# Gets a dynamic IP via DHCP from your upstream router
interface eth0
    # Use random hardware address for upstream privacy (if supported)
    # Comment out if your ISP ties service to MAC address
    # option rapid_commit
    metric 100              # Lower metric = preferred route for outbound traffic

# ─── LAN Interface (wlan0) ───────────────────────────────────────────────────
# The Pi's Wi-Fi AP — fixed IP, never gets address from DHCP
interface wlan0
    static ip_address=192.168.4.1/24
    static routers=192.168.4.1      # Pi is its own gateway on this interface
    nogateway                        # Don't use wlan0 as a default route
    nohook wpa_supplicant            # Don't run wpa_supplicant on this interface
                                     # (hostapd manages it instead)

# ─── IPv6 ────────────────────────────────────────────────────────────────────
# Option A: Use ULA (Unique Local Address) prefix for LAN IPv6
# Uncomment if you want full IPv6 support (and have configured ip6 nat in nftables)
#
# interface wlan0
#     static ip6_address=fd00::1/64

# Option B: Disable IPv6 entirely on WAN (prevents ISP IPv6 assignment)
# Use this if running disable-ipv6.sh
#
# interface eth0
#     noipv6
# interface wlan0
#     noipv6
